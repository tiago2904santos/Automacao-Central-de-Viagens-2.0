{% extends 'base.html' %}

{% block title %}Excluir ordem de serviço - Central de Viagens{% endblock %}
{% block page_title %}Excluir ordem de serviço{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="card"><div class="card-body">
    <p>Confirma excluir a ordem de serviço <strong>#{{ object.pk }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="return_to" value="{{ return_to }}">
      <button class="btn btn-danger" type="submit">Excluir</button>
      <a class="btn btn-outline-secondary" href="{{ return_to|default:'/eventos/documentos/ordens-servico/' }}">Cancelar</a>
    </form>
  </div></div>
</div>
{% endblock %}
