{% extends 'base.html' %}

{% block title %}Excluir modelo de justificativa — Central de Viagens{% endblock %}
{% block page_title %}Excluir modelo de justificativa{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="card form-card">
        <div class="card-body">
            <p>Confirma excluir o modelo <strong>{{ object.nome }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next_url }}">
                <input type="hidden" name="volta_justificativa" value="{{ volta_justificativa }}">
                <button type="submit" class="btn btn-danger">Excluir</button>
                <a href="{% url 'eventos:modelos-justificativa-lista' %}{% if volta_justificativa or next_url %}?{% if volta_justificativa %}volta_justificativa={{ volta_justificativa|urlencode }}{% endif %}{% if volta_justificativa and next_url %}&{% endif %}{% if next_url %}next={{ next_url|urlencode }}{% endif %}{% endif %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
