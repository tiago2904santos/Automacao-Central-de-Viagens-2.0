<div class="oficio-wizard-header mb-3" data-oficio-sticky-header>
  <div class="oficio-wizard-header-card">
    <div class="oficio-wizard-header-main">
      <div class="oficio-wizard-header-copy">
        <span class="oficio-wizard-eyebrow">Ofício</span>
        <h1>{{ wizard_page_title }}</h1>
      </div>
      <div class="oficio-wizard-actions">
        <button
          type="button"
          class="btn btn-outline-secondary btn-sm oficio-wizard-summary-trigger cv-btn cv-btn--secondary"
          data-oficio-glance-toggle
          aria-expanded="false"
          aria-controls="oficio-glance-panel"
          title="Mostrar/ocultar resumo do ofício"
        >
          <i class="bi bi-chevron-down"></i>
          <span data-oficio-glance-toggle-label>Resumo</span>
        </button>
        <span class="oficio-autosave-status" id="oficio-autosave-status" data-state="idle">Autosave</span>
        <a href="{% url 'eventos:oficios-global' %}" class="btn btn-outline-secondary btn-sm cv-btn cv-btn--secondary" data-autosave-link="1">Lista</a>
        {% if oficio.pk %}
        <a href="{% url 'eventos:oficio-excluir' oficio.pk %}" class="btn btn-outline-danger btn-sm cv-btn cv-btn--danger" data-autosave-link="1">Excluir</a>
        {% endif %}
      </div>
    </div>
    {% include 'eventos/oficio/_wizard_stepper.html' %}
    <!-- Submenu expansível integrado ao header -->
    {% include 'eventos/oficio/_wizard_glance.html' %}
  </div>
</div>
