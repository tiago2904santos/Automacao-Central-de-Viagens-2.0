# OSRM local para estimativa de rotas (Paraná/Brasil).
# Uso: prepare o mapa uma vez (ver docs/OSRM_DOCKER.md), depois:
#   docker-compose up -d osrm
# Configure no .env: OSRM_ENABLED=true OSRM_BASE_URL=http://localhost:5000

services:
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: central-viagens-osrm
    ports:
      - "5000:5000"
    volumes:
      - ./data/osrm:/data
    command: osrm-routed --algorithm mld /data/brazil-latest.osrm --port 5000
    restart: unless-stopped
